<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not-To-Do Liste | Känguru-Modus mit Ordnung</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #000;
            --card: #141414;
            --text: #f0f0f0;
            --text-secondary: #aaa;
            --accent: #d50000;
            --accent-hover: #ff1a1a;
            --yellow: #fc0;
            --yellow-bg: rgba(255,204,0,0.08);
            --border: #2a2a2a;
            --shadow: 0 8px 32px rgba(0,0,0,0.7);
            --radius: 14px;
            --radius-sm: 10px;
            --transition: 0.25s ease;
            --font-mono: 'Courier New', monospace;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body {
            font-family: 'Segoe UI', Inter, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: flex-start;
            padding: 20px;
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(213,0,0,0.08) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 70%, rgba(255,204,0,0.05) 0%, transparent 55%);
        }
        .container {
            width: 100%; max-width: 620px; margin-top: 20px;
            display: flex; flex-direction: column; gap: 24px;
        }
        .header { text-align: center; padding: 10px 0; }
        .header .icon-row {
            font-size: 3.2rem; margin-bottom: 4px;
            animation: hop 2.5s ease-in-out infinite; display: inline-block;
        }
        @keyframes hop {
            0%,100%{transform:translateY(0);}
            20%{transform:translateY(-10px);}
            40%{transform:translateY(0);}
            60%{transform:translateY(-5px);}
            80%{transform:translateY(0);}
        }
        .header h1 {
            font-size: 2.2rem; font-weight: 800; text-transform: uppercase;
            color: var(--accent); margin: 0;
            text-shadow: 0 0 20px rgba(213,0,0,0.4);
        }
        .header .subtitle {
            color: var(--text-secondary); font-size: 0.95rem;
            margin-top: 2px; font-style: italic; font-family: var(--font-mono);
        }
        .stats-bar {
            display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
        }
        .stat-pill {
            background: var(--card); border: 1px solid var(--border);
            padding: 10px 18px; border-radius: 30px; font-size: 0.85rem;
            color: var(--text-secondary); display: flex; align-items: center; gap: 7px;
        }
        .stat-pill span { font-weight: 700; font-size: 1.1rem; }
        .stat-pill.danger span { color: var(--accent); }
        .stat-pill.success span { color: var(--yellow); }

        /* InputCard */
        .input-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 20px;
            box-shadow: var(--shadow); display: flex; gap: 8px;
            align-items: center; flex-wrap: wrap; transition: var(--transition);
        }
        .input-card:focus-within {
            border-color: var(--accent);
            box-shadow: 0 8px 32px rgba(213,0,0,0.25);
        }
        .input-row {
            display: flex; gap: 8px; flex: 1; min-width: 0;
        }
        .order-input {
            width: 48px; background: var(--card); border: 1px solid var(--border);
            border-radius: 30px; color: var(--text); text-align: center;
            font-family: var(--font-mono); font-size: 0.9rem; outline: none;
            transition: var(--transition);
        }
        .order-input:focus { border-color: var(--accent); }
        .order-input::placeholder { color: var(--text-secondary); opacity: 0.5; }
        .text-input {
            flex: 1; background: transparent; border: none; outline: none;
            font-size: 1rem; color: var(--text); padding: 8px 4px;
            font-family: var(--font-mono);
        }
        .text-input::placeholder { color: var(--text-secondary); opacity: 0.6; font-style: italic; }
        .btn {
            border: none; cursor: pointer; font-weight: 700; font-size: 0.9rem;
            padding: 10px 20px; border-radius: 30px; transition: var(--transition);
            font-family: inherit; text-transform: uppercase; white-space: nowrap;
        }
        .btn-add {
            background: var(--accent); color: #fff;
            box-shadow: 0 4px 16px rgba(213,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-add:hover { background: var(--accent-hover); transform: translateY(-1px); }

        /* Filter Tabs */
        .filter-tabs {
            display: flex; gap: 6px; background: var(--card);
            border-radius: 30px; padding: 5px; border: 1px solid var(--border);
        }
        .filter-tab {
            flex: 1; text-align: center; padding: 9px 14px; border-radius: 26px;
            font-size: 0.85rem; font-weight: 600; cursor: pointer;
            color: var(--text-secondary); background: transparent; border: none;
            text-transform: uppercase; transition: var(--transition);
        }
        .filter-tab.active { background: var(--accent); color: #fff; }
        .filter-tab:hover:not(.active) { color: var(--text); background: rgba(255,255,255,0.03); }

        /* List */
        .list-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden;
        }
        .list-card ul {
            list-style: none; max-height: 450px; overflow-y: auto;
            scrollbar-width: thin; scrollbar-color: var(--border) transparent;
        }
        .list-card ul::-webkit-scrollbar { width: 5px; }
        .list-card ul::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        .list-card ul li {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 16px; border-bottom: 1px solid var(--border);
            transition: var(--transition); animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from{opacity:0;transform:translateX(-20px);} to{opacity:1;transform:translateX(0);} }
        .list-card ul li:last-child { border-bottom: none; }
        .list-card ul li:hover { background: rgba(255,255,255,0.02); }
        .list-card ul li.done .order-badge { opacity: 0.4; }
        .list-card ul li.done .item-text {
            text-decoration: line-through; opacity: 0.5; color: var(--yellow);
        }
        .list-card ul li.done { background: var(--yellow-bg); }
        .order-badge {
            flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
            background: var(--border); color: var(--text);
            font-weight: 700; font-size: 0.8rem; font-family: var(--font-mono);
            display: flex; align-items: center; justify-content: center;
            text-transform: uppercase; transition: var(--transition);
        }
        .checkbox {
            flex-shrink: 0; width: 24px; height: 24px; border-radius: 50%;
            border: 2px solid var(--border); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 12px; transition: var(--transition);
            background: transparent; color: transparent;
        }
        .checkbox:hover { border-color: var(--accent); }
        li.done .checkbox {
            background: var(--yellow); border-color: var(--yellow);
            color: #000; box-shadow: 0 0 14px rgba(255,204,0,0.5);
        }
        .item-text {
            flex: 1; font-size: 0.95rem; word-break: break-word;
            font-family: var(--font-mono); transition: var(--transition);
        }
        .btn-delete {
            flex-shrink: 0; background: transparent; border: none;
            color: var(--text-secondary); cursor: pointer; font-size: 1.3rem;
            width: 32px; height: 32px; border-radius: 50%; transition: var(--transition);
            display: flex; align-items: center; justify-content: center; opacity: 0;
        }
        .list-card ul li:hover .btn-delete { opacity: 1; }
        .btn-delete:hover { background: rgba(213,0,0,0.25); color: var(--accent); }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-secondary); font-family: var(--font-mono); }
        .empty-state .emoji { font-size: 3rem; display: block; margin-bottom: 10px; }

        .footer-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .btn-outline {
            background: transparent; border: 1px solid var(--border);
            color: var(--text-secondary); padding: 9px 16px; border-radius: 30px;
            font-size: 0.8rem; cursor: pointer; font-weight: 600; text-transform: uppercase;
            transition: var(--transition);
        }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); background: rgba(213,0,0,0.07); }
        .btn-outline.danger:hover { border-color: #f44; color: #f44; background: rgba(255,68,68,0.08); }

        .toast {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--card); border: 1px solid var(--border);
            padding: 12px 24px; border-radius: 30px; font-size: 0.85rem;
            font-weight: 600; color: var(--text); font-family: var(--font-mono);
            box-shadow: 0 8px 28px rgba(0,0,0,0.7); transition: transform 0.35s ease;
            z-index: 100; pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        @media (max-width: 480px) {
            .header h1 { font-size: 1.6rem; }
            .input-card { flex-direction: column; align-items: stretch; }
            .input-row { flex-wrap: wrap; }
            .order-input { width: 100%; }
            .btn-add { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>
<div class="container">
    <header class="header">
        <div class="icon-row">🦘</div>
        <h1>Not-To-Do Liste</h1>
        <p class="subtitle">Ordnung muss sein – erst Zahlen, dann Buchstaben</p>
    </header>

    <div class="stats-bar">
        <div class="stat-pill">📋 Insgesamt: <span id="stat-total">0</span></div>
        <div class="stat-pill danger">⚠️ Offen: <span id="stat-open">0</span></div>
        <div class="stat-pill success">✅ Erledigt: <span id="stat-done">0</span></div>
    </div>

    <div class="input-card">
        <div class="input-row">
            <input type="text" class="order-input" id="order-input" placeholder="1/a" maxlength="3" autocomplete="off" title="Ordnung: Zahl (1) oder Buchstabe (a)">
            <input type="text" class="text-input" id="item-input" placeholder="z.B. Kein Nazi sein..." maxlength="120" autocomplete="off">
        </div>
        <button class="btn btn-add" id="btn-add">+ Hinzufügen</button>
    </div>

    <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all">Alle</button>
        <button class="filter-tab" data-filter="open">⚠️ Offen</button>
        <button class="filter-tab" data-filter="done">✅ Abgehakt</button>
    </div>

    <div class="list-card">
        <ul id="item-list"></ul>
        <div class="empty-state" id="empty-state">
            <span class="emoji">📝</span>
            <p><strong>Noch keine Einträge</strong></p>
            <p>Gib eine Ordnung (1,2,a,b…) und einen Text ein.</p>
        </div>
    </div>

    <div class="footer-actions">
        <button class="btn-outline" id="btn-export">📤 Export</button>
        <button class="btn-outline" id="btn-import-trigger">📥 Import</button>
        <button class="btn-outline danger" id="btn-clear-done">🧹 Erledigte löschen</button>
        <button class="btn-outline danger" id="btn-clear-all">🗑️ Alle löschen</button>
    </div>
    <input type="file" id="import-file" accept=".json" style="display:none;">
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
    const orderInput = document.getElementById('order-input');
    const textInput = document.getElementById('item-input');
    const btnAdd = document.getElementById('btn-add');
    const itemList = document.getElementById('item-list');
    const emptyState = document.getElementById('empty-state');
    const statTotal = document.getElementById('stat-total');
    const statOpen = document.getElementById('stat-open');
    const statDone = document.getElementById('stat-done');
    const filterTabs = document.querySelectorAll('.filter-tab');
    const toast = document.getElementById('toast');
    const btnExport = document.getElementById('btn-export');
    const btnImportTrigger = document.getElementById('btn-import-trigger');
    const importFile = document.getElementById('import-file');
    const btnClearDone = document.getElementById('btn-clear-done');
    const btnClearAll = document.getElementById('btn-clear-all');

    const STORAGE_KEY = 'not-to-do-ordered';
    let items = [];
    let currentFilter = 'all';
    let toastTimer = null;

    function showToast(msg) {
        if (toastTimer) clearTimeout(toastTimer);
        toast.textContent = msg;
        toast.classList.add('show');
        toastTimer = setTimeout(() => { toast.classList.remove('show'); }, 2000);
    }

    function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }
    function load() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) {
                const parsed = JSON.parse(raw);
                if (Array.isArray(parsed)) items = parsed;
            }
        } catch (e) { items = []; }
    }

    function normalizeOrder(val) {
        // val ist String | null
        if (val === null || val === undefined) return null;
        const trimmed = val.trim();
        if (trimmed === '') return null;
        // Prüfe, ob es eine positive Ganzzahl ist (1, 2, 10 ...)
        if (/^\d+$/.test(trimmed)) {
            const num = parseInt(trimmed, 10);
            return { type: 'number', value: num, raw: trimmed };
        }
        // Prüfe, ob ein einzelner Buchstabe (a-z oder A-Z) vorliegt
        if (/^[a-zA-Z]$/.test(trimmed)) {
            return { type: 'letter', value: trimmed.toLowerCase(), raw: trimmed };
        }
        // Andernfalls als String
        return { type: 'string', value: trimmed.toLowerCase(), raw: trimmed };
    }

    function compareOrder(a, b) {
        const oa = normalizeOrder(a.order);
        const ob = normalizeOrder(b.order);
        // Beide nicht gesetzt -> nach Erstellungsdatum (neueste zuerst)
        if (!oa && !ob) return 0;
        // Nur a gesetzt -> a kommt vor b
        if (oa && !ob) return -1;
        // Nur b gesetzt -> b kommt vor a
        if (!oa && ob) return 1;
        // Beide gesetzt
        if (oa.type === 'number' && ob.type === 'number') {
            return oa.value - ob.value || a.createdAt - b.createdAt;
        }
        if (oa.type === 'number' && ob.type !== 'number') return -1;
        if (oa.type !== 'number' && ob.type === 'number') return 1;
        if (oa.type === 'letter' && ob.type === 'letter') {
            return oa.value.localeCompare(ob.value) || a.createdAt - b.createdAt;
        }
        if (oa.type === 'letter' && ob.type === 'string') return -1;
        if (oa.type === 'string' && ob.type === 'letter') return 1;
        // beide strings
        return oa.value.localeCompare(ob.value) || a.createdAt - b.createdAt;
    }

    function render() {
        let filtered = items;
        if (currentFilter === 'open') filtered = items.filter(i => !i.done);
        else if (currentFilter === 'done') filtered = items.filter(i => i.done);

        // Sortierung: nach Order (1,2,3 … a,b,c …) dann Erstellungsdatum
        filtered.sort((a, b) => compareOrder(a, b) || b.createdAt - a.createdAt);

        itemList.innerHTML = '';
        if (filtered.length === 0) {
            emptyState.style.display = 'block';
            const strong = emptyState.querySelector('p strong');
            const last = emptyState.querySelector('p:last-child');
            const emoji = emptyState.querySelector('.emoji');
            if (currentFilter === 'open') {
                strong.textContent = 'Keine offenen Einträge';
                last.textContent = 'Fantastisch – alles vermieden! 🎉';
                emoji.textContent = '🎉';
            } else if (currentFilter === 'done') {
                strong.textContent = 'Noch nichts abgehakt';
                last.textContent = 'Vermeide brav weiter.';
                emoji.textContent = '✅';
            } else {
                strong.textContent = 'Noch keine Einträge';
                last.textContent = 'Füge Dinge mit Ordnung hinzu.';
                emoji.textContent = '📝';
            }
        } else {
            emptyState.style.display = 'none';
            filtered.forEach(item => {
                const li = document.createElement('li');
                if (item.done) li.classList.add('done');
                li.setAttribute('data-id', item.id);

                const orderBadge = document.createElement('span');
                orderBadge.className = 'order-badge';
                orderBadge.textContent = item.order && item.order.trim() !== '' ? item.order.trim() : '–';

                const checkbox = document.createElement('button');
                checkbox.className = 'checkbox';
                checkbox.title = 'Umschalten';
                checkbox.textContent = item.done ? '✓' : '';
                checkbox.addEventListener('click', () => toggleItem(item.id));

                const textSpan = document.createElement('span');
                textSpan.className = 'item-text';
                textSpan.textContent = item.text;

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'btn-delete';
                deleteBtn.title = 'Löschen';
                deleteBtn.textContent = '×';
                deleteBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteItem(item.id); });

                li.appendChild(orderBadge);
                li.appendChild(checkbox);
                li.appendChild(textSpan);
                li.appendChild(deleteBtn);
                itemList.appendChild(li);
            });
        }
        updateStats();
    }

    function updateStats() {
        const total = items.length;
        const done = items.filter(i => i.done).length;
        statTotal.textContent = total;
        statOpen.textContent = total - done;
        statDone.textContent = done;
    }

    function addItem() {
        let orderVal = orderInput.value.trim();
        const textVal = textInput.value.trim();
        if (!textVal) { showToast('😅 Text fehlt!'); return; }
        if (textVal.length > 120) { showToast('📏 Max 120 Zeichen!'); return; }
        // Duplikatprüfung (gleicher Text + gleiche Order und offen)
        const duplicate = items.some(i =>
            i.text.toLowerCase() === textVal.toLowerCase() &&
            (i.order || '') === (orderVal || '') &&
            !i.done
        );
        if (duplicate) { showToast('⚠️ Eintrag existiert bereits (offen).'); return; }

        const newItem = {
            id: Date.now().toString(36) + Math.random().toString(36).slice(2,8),
            text: textVal,
            order: orderVal || null,
            done: false,
            createdAt: Date.now()
        };
        items.unshift(newItem);
        save();
        orderInput.value = '';
        textInput.value = '';
        textInput.focus();
        render();
        showToast('✅ „' + (orderVal ? orderVal + ' ' : '') + truncate(textVal, 30) + '„');
    }

    function toggleItem(id) {
        const item = items.find(i => i.id === id);
        if (!item) return;
        item.done = !item.done;
        if (item.done) item.doneAt = Date.now(); else delete item.doneAt;
        save();
        render();
        showToast('🔄 „' + truncate(item.text, 25) + '„ ' + (item.done ? 'abgehakt ✅' : 'wieder offen ⚠️'));
    }

    function deleteItem(id) {
        const item = items.find(i => i.id === id);
        if (!item) return;
        if (confirm('Löschen?\n„' + item.text + '„')) {
            items = items.filter(i => i.id !== id);
            save();
            render();
            showToast('🗑️ Gelöscht.');
        }
    }

    function clearDone() {
        const count = items.filter(i => i.done).length;
        if (count === 0) { showToast('ℹ️ Nichts abgehakt.'); return; }
        if (confirm(count + ' erledigte Einträge löschen?')) {
            items = items.filter(i => !i.done);
            save();
            render();
            showToast('🧹 ' + count + ' erledigte entsorgt.');
        }
    }

    function clearAll() {
        if (items.length === 0) { showToast('ℹ️ Liste leer.'); return; }
        if (confirm('ALLE ' + items.length + ' Einträge unwiderruflich löschen?')) {
            items = [];
            save();
            render();
            showToast('🗑️ Alles platt.');
        }
    }

    function exportData() {
        if (!items.length) { showToast('ℹ️ Nichts zu exportieren.'); return; }
        const blob = new Blob([JSON.stringify(items, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'not-to-do-liste-' + new Date().toISOString().slice(0,10) + '.json';
        a.click(); URL.revokeObjectURL(a.href);
        showToast('📤 Exportiert (' + items.length + ' Einträge).');
    }

    function importData(file) {
        const reader = new FileReader();
        reader.onload = e => {
            try {
                const data = JSON.parse(e.target.result);
                if (!Array.isArray(data)) throw new Error();
                const valid = data.every(obj =>
                    typeof obj.id === 'string' && typeof obj.text === 'string' &&
                    typeof obj.done === 'boolean' && typeof obj.createdAt === 'number'
                );
                if (!valid) throw new Error();
                const merge = confirm(data.length + ' Einträge gefunden. Zusammenführen?');
                if (merge) {
                    const existingIds = new Set(items.map(i => i.id));
                    items = [...items, ...data.filter(d => !existingIds.has(d.id))];
                } else items = data;
                save(); render();
                showToast('📥 Import abgeschlossen (' + items.length + ' Einträge).');
            } catch (ex) {
                showToast('❌ Keine gültige Not-To-Do Datei.');
            }
        };
        reader.readAsText(file);
        importFile.value = '';
    }

    function truncate(t, max) { return t.length > max ? t.slice(0, max) + '…' : t; }

    // Event Listener
    btnAdd.addEventListener('click', addItem);
    textInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); addItem(); }
    });
    orderInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); textInput.focus(); }
    });
    filterTabs.forEach(tab => tab.addEventListener('click', () => {
        filterTabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentFilter = tab.dataset.filter;
        render();
    }));
    btnExport.addEventListener('click', exportData);
    btnImportTrigger.addEventListener('click', () => importFile.click());
    importFile.addEventListener('change', (e) => { if (e.target.files[0]) importData(e.target.files[0]); });
    btnClearDone.addEventListener('click', clearDone);
    btnClearAll.addEventListener('click', clearAll);

    load();
    render();
    textInput.focus();
})();
</script>
</body>
</html>
