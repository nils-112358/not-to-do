<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do & Not-To-Do | Känguru-Edition</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #000;
            --card: #141414;
            --text: #f0f0f0;
            --text-secondary: #aaaaaa;
            --border: #2a2a2a;
            --shadow: 0 8px 32px rgba(0,0,0,0.7);
            --radius: 14px;
            --radius-sm: 10px;
            --transition: 0.25s ease;
            --font-mono: 'Courier New', monospace;
        }

        body {
            --accent: #d50000;
            --accent-hover: #ff1a1a;
            --accent-shadow: rgba(213,0,0,0.5);
            --done-color: #fc0;
            --done-bg: rgba(255,204,0,0.08);
            --badge-bg: #2a2a2a;
            --tab-active: #d50000;
            --tab-active-text: #fff;
        }

        body.mode-todo {
            --accent: #00c853;
            --accent-hover: #00e676;
            --accent-shadow: rgba(0,200,83,0.5);
            --done-color: #aeea00;
            --done-bg: rgba(174,234,0,0.1);
            --tab-active: #00c853;
            --tab-active-text: #000;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', Inter, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: flex-start;
            padding: 20px;
            background-image:
                radial-gradient(ellipse at 20% 20%, var(--accent-shadow) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 70%, rgba(255,204,0,0.05) 0%, transparent 55%);
        }
        .container {
            width: 100%; max-width: 620px; margin-top: 20px;
            display: flex; flex-direction: column; gap: 20px;
        }

        /* Header */
        .header { text-align: center; padding: 5px 0; }
        .header .icon-row {
            font-size: 3.2rem; margin-bottom: 0;
            animation: hop 2.5s ease-in-out infinite; display: inline-block;
        }
        @keyframes hop {
            0%,100%{transform:translateY(0);}
            20%{transform:translateY(-10px);}
            40%{transform:translateY(0);}
            60%{transform:translateY(-5px);}
            80%{transform:translateY(0);}
        }
        .header h1 {
            font-size: 2rem; font-weight: 800; text-transform: uppercase;
            color: var(--accent); margin: 0;
            text-shadow: 0 0 20px var(--accent-shadow);
        }
        .header .subtitle {
            color: var(--text-secondary); font-size: 0.9rem;
            margin-top: 2px; font-style: italic; font-family: var(--font-mono);
        }

        /* Tabs */
        .tab-bar {
            display: flex; gap: 8px; background: var(--card);
            border-radius: 30px; padding: 5px; border: 1px solid var(--border);
        }
        .tab-btn {
            flex: 1; text-align: center; padding: 10px 16px;
            border-radius: 26px; font-size: 0.9rem; font-weight: 600;
            cursor: pointer; background: transparent; border: none;
            color: var(--text-secondary); transition: var(--transition);
            text-transform: uppercase; font-family: inherit;
        }
        .tab-btn.active {
            background: var(--tab-active); color: var(--tab-active-text);
            box-shadow: 0 4px 14px var(--accent-shadow);
        }
        .tab-btn:hover:not(.active) { color: var(--text); background: rgba(255,255,255,0.03); }

        /* Stats */
        .stats-bar { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .stat-pill {
            background: var(--card); border: 1px solid var(--border);
            padding: 8px 16px; border-radius: 30px; font-size: 0.8rem;
            color: var(--text-secondary); display: flex; align-items: center; gap: 6px;
        }
        .stat-pill span { font-weight: 700; font-size: 1rem; }
        .stat-pill.danger span { color: var(--accent); }
        .stat-pill.success span { color: var(--done-color); }

        /* Input */
        .input-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 16px;
            box-shadow: var(--shadow); display: flex; gap: 8px;
            align-items: center; flex-wrap: wrap;
        }
        .input-card:focus-within {
            border-color: var(--accent);
            box-shadow: 0 8px 32px var(--accent-shadow);
        }
        .input-row { display: flex; gap: 8px; flex: 1; min-width: 0; }
        .order-input {
            width: 48px; background: var(--card); border: 1px solid var(--border);
            border-radius: 30px; color: var(--text); text-align: center;
            font-family: var(--font-mono); font-size: 0.9rem; outline: none;
        }
        .order-input:focus { border-color: var(--accent); }
        .text-input {
            flex: 1; background: transparent; border: none; outline: none;
            font-size: 1rem; color: var(--text); padding: 8px 4px;
            font-family: var(--font-mono);
        }
        .text-input::placeholder { color: var(--text-secondary); opacity: 0.6; font-style: italic; }
        .btn {
            border: none; cursor: pointer; font-weight: 700; font-size: 0.85rem;
            padding: 10px 18px; border-radius: 30px; transition: var(--transition);
            font-family: inherit; text-transform: uppercase; white-space: nowrap;
        }
        .btn-add {
            background: var(--accent); color: #fff;
            box-shadow: 0 4px 16px var(--accent-shadow);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-add:hover { background: var(--accent-hover); transform: translateY(-1px); }

        /* Filter */
        .filter-tabs {
            display: flex; gap: 6px; background: var(--card);
            border-radius: 30px; padding: 5px; border: 1px solid var(--border);
        }
        .filter-tab {
            flex: 1; text-align: center; padding: 8px 12px; border-radius: 26px;
            font-size: 0.8rem; font-weight: 600; cursor: pointer;
            color: var(--text-secondary); background: transparent; border: none;
            text-transform: uppercase; transition: var(--transition);
        }
        .filter-tab.active { background: var(--accent); color: #fff; }
        .filter-tab:hover:not(.active) { color: var(--text); background: rgba(255,255,255,0.03); }

        /* List */
        .list-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden;
        }
        .list-card ul {
            list-style: none; max-height: 380px; overflow-y: auto;
            scrollbar-width: thin; scrollbar-color: var(--border) transparent;
        }
        .list-card ul::-webkit-scrollbar { width: 5px; }
        .list-card ul::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        .list-card ul li {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 16px; border-bottom: 1px solid var(--border);
            transition: var(--transition); animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from{opacity:0;transform:translateX(-20px);} to{opacity:1;transform:translateX(0);} }
        .list-card ul li:last-child { border-bottom: none; }
        .list-card ul li:hover { background: rgba(255,255,255,0.02); }
        .list-card ul li.done .order-badge { opacity: 0.4; }
        .list-card ul li.done .item-text {
            text-decoration: line-through; opacity: 0.5; color: var(--done-color);
        }
        .list-card ul li.done { background: var(--done-bg); }
        .order-badge {
            flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
            background: var(--badge-bg); color: var(--text);
            font-weight: 700; font-size: 0.8rem; font-family: var(--font-mono);
            display: flex; align-items: center; justify-content: center;
            text-transform: uppercase;
        }
        .checkbox {
            flex-shrink: 0; width: 24px; height: 24px; border-radius: 50%;
            border: 2px solid var(--border); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 12px; transition: var(--transition);
            background: transparent; color: transparent;
        }
        .checkbox:hover { border-color: var(--accent); }
        li.done .checkbox {
            background: var(--done-color); border-color: var(--done-color);
            color: #000; box-shadow: 0 0 12px var(--done-color);
        }
        .item-text {
            flex: 1; font-size: 0.9rem; word-break: break-word;
            font-family: var(--font-mono); transition: var(--transition);
        }
        .btn-delete {
            flex-shrink: 0; background: transparent; border: none;
            color: var(--text-secondary); cursor: pointer; font-size: 1.3rem;
            width: 32px; height: 32px; border-radius: 50%; transition: var(--transition);
            display: flex; align-items: center; justify-content: center; opacity: 0;
        }
        .list-card ul li:hover .btn-delete { opacity: 1; }
        .btn-delete:hover { background: rgba(255,255,255,0.1); color: var(--accent); }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-secondary); font-family: var(--font-mono); }
        .empty-state .emoji { font-size: 3rem; display: block; margin-bottom: 10px; }

        /* Footer */
        .footer-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .btn-outline {
            background: transparent; border: 1px solid var(--border);
            color: var(--text-secondary); padding: 8px 14px; border-radius: 30px;
            font-size: 0.75rem; cursor: pointer; font-weight: 600; text-transform: uppercase;
            transition: var(--transition);
        }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); background: rgba(255,255,255,0.03); }
        .btn-outline.danger:hover { border-color: #ff4444; color: #ff4444; background: rgba(255,68,68,0.08); }

        /* Toast */
        .toast {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--card); border: 1px solid var(--border);
            padding: 12px 24px; border-radius: 30px; font-size: 0.8rem;
            font-weight: 600; color: var(--text); font-family: var(--font-mono);
            box-shadow: 0 8px 28px rgba(0,0,0,0.7); transition: transform 0.35s ease;
            z-index: 100; pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        @media (max-width: 480px) {
            .header h1 { font-size: 1.5rem; }
            .input-card { flex-direction: column; align-items: stretch; }
            .input-row { flex-wrap: wrap; }
            .order-input { width: 100%; }
            .btn-add { width: 100%; text-align: center; }
            .list-card ul { max-height: 280px; }
        }
    </style>
</head>
<body>
<div class="container">
    <header class="header">
        <div class="icon-row">🦘</div>
        <h1 id="header-title">Not-To-Do</h1>
        <p class="subtitle">Ordnung muss sein – erst Zahlen, dann Buchstaben</p>
    </header>

    <!-- Tabs -->
    <div class="tab-bar">
        <button class="tab-btn active" data-list="nottodo">🚫 Not-To-Do</button>
        <button class="tab-btn" data-list="todo">✅ To-Do</button>
    </div>

    <!-- Stats -->
    <div class="stats-bar">
        <div class="stat-pill">📋 Insgesamt: <span id="stat-total">0</span></div>
        <div class="stat-pill danger">⚠️ Offen: <span id="stat-open">0</span></div>
        <div class="stat-pill success">✅ Erledigt: <span id="stat-done">0</span></div>
    </div>

    <!-- Input -->
    <div class="input-card">
        <div class="input-row">
            <input type="text" class="order-input" id="order-input" placeholder="1/a" maxlength="3" autocomplete="off" title="Ordnung: 1, 2, a, b...">
            <input type="text" class="text-input" id="item-input" placeholder="Was willst du vermeiden?" maxlength="120" autocomplete="off">
        </div>
        <button class="btn btn-add" id="btn-add">+ Hinzufügen</button>
    </div>

    <!-- Filter -->
    <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all">Alle</button>
        <button class="filter-tab" data-filter="open">⚠️ Offen</button>
        <button class="filter-tab" data-filter="done">✅ Abgehakt</button>
    </div>

    <!-- List -->
    <div class="list-card">
        <ul id="item-list"></ul>
        <div class="empty-state" id="empty-state">
            <span class="emoji">📝</span>
            <p><strong>Noch keine Einträge</strong></p>
            <p>Gib eine Ordnung und einen Text ein.</p>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer-actions">
        <button class="btn-outline" id="btn-export">📤 Export</button>
        <button class="btn-outline" id="btn-import-trigger">📥 Import</button>
        <button class="btn-outline danger" id="btn-clear-done">🧹 Erledigte löschen</button>
        <button class="btn-outline danger" id="btn-clear-all">🗑️ Alle löschen</button>
    </div>
    <input type="file" id="import-file" accept=".json" style="display:none;">
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
    // ─── DOM ──────────────────────────────
    const headerTitle = document.getElementById('header-title');
    const tabBtns = document.querySelectorAll('.tab-btn');
    const orderInput = document.getElementById('order-input');
    const textInput = document.getElementById('item-input');
    const btnAdd = document.getElementById('btn-add');
    const itemList = document.getElementById('item-list');
    const emptyState = document.getElementById('empty-state');
    const statTotal = document.getElementById('stat-total');
    const statOpen = document.getElementById('stat-open');
    const statDone = document.getElementById('stat-done');
    const filterTabs = document.querySelectorAll('.filter-tab');
    const toast = document.getElementById('toast');
    const btnExport = document.getElementById('btn-export');
    const btnImportTrigger = document.getElementById('btn-import-trigger');
    const importFile = document.getElementById('import-file');
    const btnClearDone = document.getElementById('btn-clear-done');
    const btnClearAll = document.getElementById('btn-clear-all');

    // ─── State ────────────────────────────
    const STORAGE_TODO = 'todo-ordered';
    const STORAGE_NOTTODO = 'not-to-do-ordered';
    const STORAGE_LAST_TAB = 'lastActiveList';

    let activeList = localStorage.getItem(STORAGE_LAST_TAB) === 'todo' ? 'todo' : 'nottodo';
    let todoItems = [];
    let nottodoItems = [];
    let currentFilter = 'all';
    let toastTimer = null;

    // Eingabe-Cache pro Liste
    const inputCache = {
        todo: { order: '', text: '' },
        nottodo: { order: '', text: '' }
    };

    function getItems() {
        return activeList === 'todo' ? todoItems : nottodoItems;
    }

    function setItems(newItems) {
        if (activeList === 'todo') todoItems = newItems;
        else nottodoItems = newItems;
    }

    // ─── Toast ────────────────────────────
    function showToast(msg) {
        if (toastTimer) clearTimeout(toastTimer);
        toast.textContent = msg;
        toast.classList.add('show');
        toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
    }

    // ─── LocalStorage Wrapper ────────────
    function save() {
        localStorage.setItem(STORAGE_TODO, JSON.stringify(todoItems));
        localStorage.setItem(STORAGE_NOTTODO, JSON.stringify(nottodoItems));
    }

    function load() {
        try {
            const rawTodo = localStorage.getItem(STORAGE_TODO);
            if (rawTodo) todoItems = JSON.parse(rawTodo);
            else todoItems = [];
        } catch (e) { todoItems = []; }

        try {
            const rawNot = localStorage.getItem(STORAGE_NOTTODO);
            if (rawNot) nottodoItems = JSON.parse(rawNot);
            else nottodoItems = [];
        } catch (e) { nottodoItems = []; }
    }

    // ─── Ordnung / Sortierung ─────────────
    function normalizeOrder(val) {
        if (!val) return null;
        const t = val.trim();
        if (t === '') return null;
        if (/^\d+$/.test(t)) return { type: 'number', value: parseInt(t,10), raw: t };
        if (/^[a-zA-Z]$/.test(t)) return { type: 'letter', value: t.toLowerCase(), raw: t };
        return { type: 'string', value: t.toLowerCase(), raw: t };
    }

    function compareOrder(a, b) {
        const oa = normalizeOrder(a.order);
        const ob = normalizeOrder(b.order);
        if (!oa && !ob) return 0;
        if (oa && !ob) return -1;
        if (!oa && ob) return 1;
        if (oa.type === 'number' && ob.type === 'number') return oa.value - ob.value || a.createdAt - b.createdAt;
        if (oa.type === 'number' && ob.type !== 'number') return -1;
        if (oa.type !== 'number' && ob.type === 'number') return 1;
        if (oa.type === 'letter' && ob.type === 'letter') return oa.value.localeCompare(ob.value) || a.createdAt - b.createdAt;
        if (oa.type === 'letter' && ob.type === 'string') return -1;
        if (oa.type === 'string' && ob.type === 'letter') return 1;
        return oa.value.localeCompare(ob.value) || a.createdAt - b.createdAt;
    }

    // ─── UI anpassen an aktiven Tab ──────
    function applyTabStyle() {
        document.body.classList.remove('mode-todo', 'mode-nottodo');
        if (activeList === 'todo') {
            document.body.classList.add('mode-todo');
            headerTitle.textContent = 'To-Do';
            textInput.placeholder = 'Was willst du erledigen?';
        } else {
            document.body.classList.add('mode-nottodo');
            headerTitle.textContent = 'Not-To-Do';
            textInput.placeholder = 'Was willst du vermeiden?';
        }
        // Tabs aktiv setzen
        tabBtns.forEach(btn => {
            const list = btn.getAttribute('data-list');
            btn.classList.toggle('active', list === activeList);
        });
    }

    function restoreInputCache() {
        const cache = inputCache[activeList];
        orderInput.value = cache.order;
        textInput.value = cache.text;
    }

    function saveInputCache() {
        inputCache[activeList] = {
            order: orderInput.value,
            text: textInput.value
        };
    }

    // ─── Render ──────────────────────────
    function render() {
        const items = getItems();
        let filtered = items;
        if (currentFilter === 'open') filtered = items.filter(i => !i.done);
        else if (currentFilter === 'done') filtered = items.filter(i => i.done);

        // Sortierung nach Ordnung + Erstellungsdatum
        filtered.sort((a, b) => compareOrder(a, b) || b.createdAt - a.createdAt);

        itemList.innerHTML = '';

        if (filtered.length === 0) {
            emptyState.style.display = 'block';
            const strong = emptyState.querySelector('p strong');
            const last = emptyState.querySelector('p:last-child');
            const emoji = emptyState.querySelector('.emoji');
            const listType = activeList === 'todo' ? 'To-Do' : 'Not-To-Do';
            if (currentFilter === 'open') {
                strong.textContent = 'Keine offenen Einträge';
                last.textContent = activeList === 'todo' ? 'Alles erledigt – fantastisch! 🎉' : 'Alles vermieden – fantastisch! 🎉';
                emoji.textContent = '🎉';
            } else if (currentFilter === 'done') {
                strong.textContent = 'Noch nichts abgehakt';
                last.textContent = 'Sobald du etwas abhakst, erscheint es hier.';
                emoji.textContent = '✅';
            } else {
                strong.textContent = `Noch keine ${listType}-Einträge`;
                last.textContent = 'Gib eine Ordnung und einen Text ein.';
                emoji.textContent = '📝';
            }
        } else {
            emptyState.style.display = 'none';
            filtered.forEach(item => {
                const li = document.createElement('li');
                if (item.done) li.classList.add('done');
                li.setAttribute('data-id', item.id);

                const badge = document.createElement('span');
                badge.className = 'order-badge';
                badge.textContent = item.order && item.order.trim() !== '' ? item.order.trim() : '–';

                const checkbox = document.createElement('button');
                checkbox.className = 'checkbox';
                checkbox.title = 'Umschalten';
                checkbox.textContent = item.done ? '✓' : '';
                checkbox.addEventListener('click', () => toggleItem(item.id));

                const textSpan = document.createElement('span');
                textSpan.className = 'item-text';
                textSpan.textContent = item.text;

                const delBtn = document.createElement('button');
                delBtn.className = 'btn-delete';
                delBtn.title = 'Löschen';
                delBtn.textContent = '×';
                delBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteItem(item.id); });

                li.appendChild(badge);
                li.appendChild(checkbox);
                li.appendChild(textSpan);
                li.appendChild(delBtn);
                itemList.appendChild(li);
            });
        }

        updateStats(items);
    }

    function updateStats(items) {
        const total = items.length;
        const done = items.filter(i => i.done).length;
        statTotal.textContent = total;
        statOpen.textContent = total - done;
        statDone.textContent = done;
    }

    // ─── Aktionen ────────────────────────
    function addItem() {
        const orderVal = orderInput.value.trim();
        const textVal = textInput.value.trim();
        if (!textVal) { showToast('😅 Text fehlt!'); return; }
        if (textVal.length > 120) { showToast('📏 Max 120 Zeichen!'); return; }

        const items = getItems();
        const duplicate = items.some(i =>
            i.text.toLowerCase() === textVal.toLowerCase() &&
            (i.order || '') === (orderVal || '') &&
            !i.done
        );
        if (duplicate) { showToast('⚠️ Eintrag existiert bereits (offen).'); return; }

        const newItem = {
            id: Date.now().toString(36) + Math.random().toString(36).slice(2,8),
            text: textVal,
            order: orderVal || null,
            done: false,
            createdAt: Date.now()
        };
        items.unshift(newItem);
        setItems(items);
        save();
        orderInput.value = '';
        textInput.value = '';
        saveInputCache();
        textInput.focus();
        render();
        const prefix = orderVal ? orderVal + ' ' : '';
        showToast('✅ „' + prefix + truncate(textVal, 30) + '„');
    }

    function toggleItem(id) {
        const items = getItems();
        const item = items.find(i => i.id === id);
        if (!item) return;
        item.done = !item.done;
        if (item.done) item.doneAt = Date.now(); else delete item.doneAt;
        setItems(items);
        save();
        render();
        showToast('🔄 „' + truncate(item.text, 25) + '„ ' + (item.done ? 'abgehakt ✅' : 'wieder offen ⚠️'));
    }

    function deleteItem(id) {
        const items = getItems();
        const item = items.find(i => i.id === id);
        if (!item) return;
        if (confirm('Löschen?\n„' + item.text + '„')) {
            const filtered = items.filter(i => i.id !== id);
            setItems(filtered);
            save();
            render();
            showToast('🗑️ Gelöscht.');
        }
    }

    function clearDone() {
        const items = getItems();
        const count = items.filter(i => i.done).length;
        if (count === 0) { showToast('ℹ️ Nichts abgehakt.'); return; }
        if (confirm(count + ' erledigte Einträge löschen?')) {
            const filtered = items.filter(i => !i.done);
            setItems(filtered);
            save();
            render();
            showToast('🧹 ' + count + ' erledigte entsorgt.');
        }
    }

    function clearAll() {
        const items = getItems();
        if (items.length === 0) { showToast('ℹ️ Liste leer.'); return; }
        if (confirm('ALLE ' + items.length + ' Einträge unwiderruflich löschen?')) {
            setItems([]);
            save();
            render();
            showToast('🗑️ Alles platt.');
        }
    }

    function exportData() {
        const items = getItems();
        if (!items.length) { showToast('ℹ️ Nichts zu exportieren.'); return; }
        const name = activeList === 'todo' ? 'to-do-liste' : 'not-to-do-liste';
        const blob = new Blob([JSON.stringify(items, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = name + '-' + new Date().toISOString().slice(0,10) + '.json';
        a.click(); URL.revokeObjectURL(a.href);
        showToast('📤 Exportiert (' + items.length + ' Einträge).');
    }

    function importData(file) {
        const reader = new FileReader();
        reader.onload = e => {
            try {
                const data = JSON.parse(e.target.result);
                if (!Array.isArray(data)) throw new Error();
                const valid = data.every(obj =>
                    typeof obj.id === 'string' && typeof obj.text === 'string' &&
                    typeof obj.done === 'boolean' && typeof obj.createdAt === 'number'
                );
                if (!valid) throw new Error();
                const items = getItems();
                const merge = confirm(data.length + ' Einträge gefunden. Mit aktueller Liste zusammenführen?');
                let newList;
                if (merge) {
                    const existingIds = new Set(items.map(i => i.id));
                    newList = [...items, ...data.filter(d => !existingIds.has(d.id))];
                } else {
                    newList = data;
                }
                setItems(newList);
                save();
                render();
                showToast('📥 Import abgeschlossen (' + newList.length + ' Einträge).');
            } catch (ex) {
                showToast('❌ Keine gültige Datei.');
            }
        };
        reader.readAsText(file);
        importFile.value = '';
    }

    function truncate(t, max) { return t.length > max ? t.slice(0, max) + '…' : t; }

    // ─── Tab-Wechsel ──────────────────────
    function switchTab(listName) {
        if (activeList === listName) return;
        saveInputCache();
        activeList = listName;
        localStorage.setItem(STORAGE_LAST_TAB, activeList);
        // Filter zurücksetzen
        currentFilter = 'all';
        filterTabs.forEach(t => t.classList.remove('active'));
        const allTab = document.querySelector('.filter-tab[data-filter="all"]');
        if (allTab) allTab.classList.add('active');
        applyTabStyle();
        restoreInputCache();
        render();
        textInput.focus();
    }

    // ─── Event Listener ──────────────────
    tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const list = btn.getAttribute('data-list');
            switchTab(list);
        });
    });

    btnAdd.addEventListener('click', addItem);
    textInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); addItem(); }
    });
    orderInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); textInput.focus(); }
    });

    filterTabs.forEach(tab => {
        tab.addEventListener('click', () => {
            filterTabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentFilter = tab.getAttribute('data-filter');
            render();
        });
    });

    btnExport.addEventListener('click', exportData);
    btnImportTrigger.addEventListener('click', () => importFile.click());
    importFile.addEventListener('change', e => { if (e.target.files[0]) importData(e.target.files[0]); });
    btnClearDone.addEventListener('click', clearDone);
    btnClearAll.addEventListener('click', clearAll);

    // ─── Init ────────────────────────────
    load();
    applyTabStyle();
    restoreInputCache();
    // Falls zuletzt todo aktiv war, all-Filter korrekt setzen
    const allFilter = document.querySelector('.filter-tab[data-filter="all"]');
    if (allFilter) allFilter.classList.add('active');
    render();
    textInput.focus();
})();
</script>
</body>
</html>
